<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Glow Gradient -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <!-- Accent Line Gradient -->
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <!-- Green Buy Gradient -->
    <linearGradient id="buy-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#15803d"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>

  <!-- Ambient Glow -->
  <circle cx="128" cy="128" r="128" fill="url(#glow)"/>

  <!-- Logo Shape -->
  <!-- Inner Diamond/Shield representing trust/wallet -->
  <path d="M128 32L208 80V160L128 208L48 160V80L128 32Z" fill="#12121a" stroke="url(#accent-grad)" stroke-width="6" stroke-linejoin="round"/>
  
  <!-- Stylized "C" representing Chad / Coin -->
  <path d="M152 88C144 80 132 76 120 76C96 76 78 94 78 120C78 146 96 164 120 164C132 164 144 160 152 152" stroke="url(#buy-grad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Stylized lightning/chart arrow representing rapid trading / rocket growth -->
  <path d="M124 100L148 120L116 128L140 152" stroke="#f8fafc" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
